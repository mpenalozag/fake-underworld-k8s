apiVersion: batch/v1
kind: Job
metadata:
  name: poc-app-stg-postsync-barrier
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 30
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: noop
          image: busybox:1.36
          command: ["sh", "-c", "echo postsync-barrier-ran; sleep 1"]
